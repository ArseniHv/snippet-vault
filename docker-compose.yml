services:
  mongodb:
    image: mongo:7
    container_name: snippetvault-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: snippetvault
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: snippetvault-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/snippetvault
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production-32chars}
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongo_data: